<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREETIMEGAMING - Best Free Fire Sensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; }
        .red-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.3); }
        .card-bg { background-color: #1a1a1a; }
        .text-glow { text-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
    </style>
</head>
<body class="pb-10">

    <header class="flex justify-between items-center p-4 border-b border-gray-800 bg-black sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center font-bold text-xs">FT</div>
            <h1 class="text-red-600 font-bold text-xl tracking-wider">FREETIMEGAMING</h1>
        </div>
        <div class="text-green-500 text-sm">🛡️ 100% Safe</div>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <div id="inputSection">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold mt-4 leading-tight">Perfect Sensitivity<br>according to your device</h2>
            </div>

            <div class="card-bg p-6 rounded-2xl red-glow border border-gray-800">
                <div class="mb-4">
                    <label class="block text-xs text-gray-500 font-bold mb-1">Device Name</label>
                    <input type="text" id="deviceName" placeholder="Search Device (e.g. Vivo V23)" class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-red-600">
                </div>

                <div class="mb-6">
                    <label class="block text-xs text-gray-500 font-bold mb-1">RAM</label>
                    <select id="deviceRam" class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-red-600">
                        <option value="4GB">4GB RAM</option>
                        <option value="6GB">6GB RAM</option>
                        <option value="8GB">8GB RAM</option>
                        <option value="12GB">12GB RAM</option>
                    </select>
                </div>

                <button onclick="generateSensi()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl transition-all">
                    ⚡ GENERATE SENSITIVITY
                </button>
            </div>
        </div>

        <div id="resultSection" class="hidden">
            <div class="card-bg p-5 rounded-3xl red-glow border border-red-900/30">
                <div class="bg-red-600 text-white text-center py-2 rounded-xl font-bold mb-6 text-sm">⚡ YOUR SETTINGS</div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black border border-gray-800 p-4 rounded-2xl text-center">
                        <p class="text-gray-500 text-[10px] font-bold mb-1">GENERAL</p>
                        <h2 class="text-red-600 text-4xl font-black text-glow" id="vGen">0</h2>
                    </div>
                    <div class="bg-black border border-gray-800 p-4 rounded-2xl text-center">
                        <p class="text-gray-500 text-[10px] font-bold mb-1">RED DOT</p>
                        <h2 class="text-red-600 text-4xl font-black text-glow" id="vRed">0</h2>
                    </div>
                    <div class="bg-black border border-gray-800 p-4 rounded-2xl text-center">
                        <p class="text-gray-500 text-[10px] font-bold mb-1">DPI</p>
                        <h2 class="text-red-600 text-4xl font-black text-glow" id="vDpi">0</h2>
                    </div>
                    <div class="bg-black border border-gray-800 p-4 rounded-2xl text-center">
                        <p class="text-gray-500 text-[10px] font-bold mb-1">FIRE BUTTON</p>
                        <h2 class="text-red-600 text-4xl font-black text-glow" id="vFire">0</h2>
                    </div>
                </div>

                <button onclick="window.location.reload()" class="w-full mt-6 text-gray-500 text-xs font-bold underline">Generate for another device?</button>
            </div>
        </div>

        <div class="mt-16 text-center">
            <h2 class="text-2xl font-black text-red-600 mb-6">FREETIMEGAMING Packs</h2>

            <div class="card-bg p-6 rounded-3xl border border-gray-800 mb-6 text-left">
                <h3 class="text-xl font-bold">Android Advance Sensi</h3>
                <p class="text-gray-500 text-sm mb-4">70% Headshot Rate Guaranteed</p>
                <p class="text-white text-3xl font-black mb-4">₹299</p>
                <button onclick="buyPack('Advance Sensi', 299)" class="w-full bg-red-600 py-4 rounded-2xl font-bold">BUY NOW</button>
            </div>

            <div class="card-bg p-6 rounded-3xl border border-red-600/50 red-glow mb-6 text-left">
                <h3 class="text-xl font-bold">Android Global Sensi</h3>
                <p class="text-gray-500 text-sm mb-4">95% Headshot Rate (Pro Players)</p>
                <p class="text-white text-3xl font-black mb-4">₹899</p>
                <button onclick="buyPack('Global Sensi', 899)" class="w-full bg-red-600 py-4 rounded-2xl font-bold">BUY NOW</button>
            </div>
        </div>

    </main>

    <script>
        function generateSensi() {
            const name = document.getElementById('deviceName').value;
            if(!name) { alert("Please enter device name!"); return; }
            
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');

            document.getElementById('vGen').innerText = Math.floor(Math.random() * (200 - 180) + 180);
            document.getElementById('vRed').innerText = Math.floor(Math.random() * (190 - 175) + 175);
            document.getElementById('vDpi').innerText = Math.floor(Math.random() * (600 - 410) + 410);
            document.getElementById('vFire').innerText = Math.floor(Math.random() * (56 - 44) + 44);
        }

        function buyPack(name, price) {
            let myNumber = "91+6375514787"; 
            let message = `Hello FREETIMEGAMING! Mujhe apka ${name} pack kharidna hai. Price: ₹${price}.`;
            let url = "https://wa.me/" + myNumber + "?text=" + encodeURIComponent(message);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
